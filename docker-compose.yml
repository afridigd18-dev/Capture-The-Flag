version: "3.9"

services:
  # ------------------------------------------------------------------ #
  # Flask CTF App                                                        #
  # ------------------------------------------------------------------ #
  ctf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hackarena_ctf
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////app/instance/ctf.db
    volumes:
      - ctf_uploads:/app/app/static/uploads
      - ctf_db:/app/instance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/auth/login')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ctf_uploads:
  ctf_db:
